name: nvchecker

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes
  workflow_dispatch:

env:
  NVCHECKER_SOURCES_FILE: 'sources.toml'

jobs:
  main:
    name: Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            jq \
            git \
            curl

      - name: Install nvchecker
        run: |
          set -e
          pip3 install --upgrade nvchecker

      - name: Set up variables
        id: vars
        run: |
          set -ex
          echo "keyfile=$(yq -r '.__config__.keyfile' '${{ env.NVCHECKER_SOURCES_FILE }}')" >> "${GITHUB_OUTPUT}"
          echo "newver=$(yq -r '.__config__.newver' '${{ env.NVCHECKER_SOURCES_FILE }}')" >> "${GITHUB_OUTPUT}"
          echo "oldver=$(yq -r '.__config__.oldver' '${{ env.NVCHECKER_SOURCES_FILE }}')" >> "${GITHUB_OUTPUT}"

      - name: Set up keys file
        run: |
          set -ex
          if [ -n '${{ steps.vars.outputs.keyfile }}' ] && [ -f '${{ steps.vars.outputs.keyfile }}' ]
          then
            echo '::warning::A nvchecker key file already resides in this repository!'
            exit 0
          fi
          echo '[keys]' > '${{ steps.vars.outputs.keyfile }}'
          if [ -n '${{ secrets.API_KEY_GITHUB }}' ]
          then
            echo '[keys]' > '${{ steps.vars.outputs.keyfile }}'
            echo 'github = "${{ secrets.API_KEY_GITHUB }}"' >> '${{ steps.vars.outputs.keyfile }}'
            echo 'Added GitHub API key to nvchecker key file.'
          else
            echo '::warning::GitHub Secret for GitHub API key is not set up!'
          fi

      - name: Run nvchecker
        run: |
          set -e
          nvchecker --failures --file '${{ env.NVCHECKER_SOURCES_FILE }}'

      - name: Determine updates
        id: results
        run: |
          set -eux
          if cmp -s '${{ steps.vars.outputs.oldver }}' '${{ steps.vars.outputs.newver }}'; then
            echo '::notice::No updates were found.'
            exit 0
          fi

          outdated=$(jq -c --argfile old ${{ steps.vars.outputs.oldver }} --argfile new ${{ steps.vars.outputs.newver }} \
            '.data | to_entries | map(select(.value.version != $old.data[.key].version)) | map(.key)')
          
          echo "outdated_entries_json=$outdated" >> $GITHUB_OUTPUT
          echo "outdated_count=$(echo $outdated | jq 'length')" >> $GITHUB_OUTPUT

      - name: Configure git
        if: steps.results.outputs.outdated_count > 0
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create Individual Pull Requests
        if: steps.results.outputs.outdated_count > 0
        run: |
          set -eux
          # Temporarily store the new versions to read from while we reset the workspace for branches
          cp '${{ steps.vars.outputs.newver }}' 'newver_temp.json'
          
          # Iterate through each outdated entry
          echo '${{ steps.results.outputs.outdated_entries_json }}' | jq -r '.[]' | while read -r entry; do
            old_version=$(jq -r ".data[\"$entry\"].version" '${{ steps.vars.outputs.oldver }}')
            new_version=$(jq -r ".data[\"$entry\"].version" 'newver_temp.json')
            release_url=$(jq -r ".data[\"$entry\"].url // empty" 'newver_temp.json')
            
            branch_name="update-${entry}-${new_version}"
            
            # 1. Check if PR or Branch already exists to avoid spam
            if git ls-remote --heads origin "$branch_name" | grep -q "$branch_name"; then
              echo "Branch $branch_name already exists. Skipping."
              continue
            fi

            # 2. Create Branch and Commit
            git switch main
            git switch -c "$branch_name"
            
            # Update the specific entry in oldver and newver files
            jq ".data[\"$entry\"].version = \"$new_version\"" '${{ steps.vars.outputs.oldver }}' > tmp.json && mv tmp.json '${{ steps.vars.outputs.oldver }}'
            jq ".data[\"$entry\"].version = \"$new_version\"" '${{ steps.vars.outputs.newver }}' > tmp.json && mv tmp.json '${{ steps.vars.outputs.newver }}'
            
            git add '${{ steps.vars.outputs.oldver }}' '${{ steps.vars.outputs.newver }}'
            git commit -m "update($entry): $old_version -> $new_version"
            git push origin "$branch_name"

            # 3. Prepare PR Body
            pr_body="Automated update for **$entry** from \`$old_version\` to \`$new_version\`."
            if [ -n "$release_url" ]; then
              pr_body="$pr_body\n\n**Release URL:** $release_url"
            fi

            # 4. Create PR via API
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls \
              -d "$(jq -n \
                --arg title "nvchecker: $entry $new_version" \
                --arg body "$pr_body" \
                --arg head "$branch_name" \
                --arg base "main" \
                '{title: $title, body: $body, head: $head, base: $base}')"
            
            # Return to main for the next iteration
            git checkout main
          done
